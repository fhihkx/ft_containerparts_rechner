<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Seite nicht gefunden</title>
  <meta http-equiv="refresh" content="0; url=./index.html">
  <script>
    (function() {
      var target = './index.html';
      if (location.pathname.endsWith('/')) target = location.pathname + 'index.html';
      location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Weiterleitung zur Startseite… <a href="./index.html">Klick</a></p>
</body>
</html>
